name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # 1. Build on every supported platform
  # ────────────────────────────────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.os }} · ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            runner: ubuntu-22.04
            arch: x86_64
            extra_packages: libc6-dev-i386
          - os: ubuntu-24.04
            runner: ubuntu-24.04
            arch: x86_64
            extra_packages: libc6-dev-i386
          - os: ubuntu-22.04
            runner: ubuntu-22.04-arm
            arch: arm64
            extra_packages: ""
          - os: ubuntu-24.04
            runner: ubuntu-24.04-arm
            arch: arm64
            extra_packages: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang llvm \
            libbpf-dev \
            build-essential \
            linux-headers-$(uname -r) \
            ${{ matrix.extra_packages }}

      - name: Build
        run: make

      # ── Package: BPF object is arch-independent, user binary is per-arch ──
      - name: Package artifacts
        run: |
          TAG=${GITHUB_REF_NAME}
          OS=$(echo "${{ matrix.os }}" | tr '.' '-')   # ubuntu-22-04
          ARCH=${{ matrix.arch }}
          DIST="xdp-ipip-overlay-${TAG}-${OS}-${ARCH}"

          mkdir -p "$DIST/scripts"
          cp xdp_prog_kern.o  "$DIST/"
          cp xdp_prog_user    "$DIST/"
          cp scripts/*.sh     "$DIST/scripts/"
          cp README.md        "$DIST/"

          tar czf "${DIST}.tar.gz" "$DIST"
          echo "DIST_FILE=${DIST}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipip-${{ matrix.os }}-${{ matrix.arch }}
          path: "*.tar.gz"

  # ────────────────────────────────────────────────────────────────────────
  # 2. Collect all tarballs and create GitHub Release
  # ────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: release-ipip-*
          merge-multiple: true

      - name: List collected artifacts
        run: ls -lh dist/

      - name: Extract changelog entry for this tag
        id: changelog
        run: |
          TAG=${GITHUB_REF_NAME}
          # If you maintain a CHANGELOG.md, extract the section for $TAG here.
          # Fallback: use the annotated tag message.
          MSG=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || echo "Release $TAG")
          # GitHub multiline output
          {
            echo 'notes<<EOF'
            echo "$MSG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ${{ steps.changelog.outputs.notes }}

            ## Artifacts

            | File | Description |
            |------|-------------|
            | `xdp_prog_kern.o`        | BPF bytecode (architecture-independent) |
            | `xdp_prog_user`          | User-space map management tool (per-arch) |
            | `scripts/setup_host.sh`  | Initialize XDP programs on a host |
            | `scripts/add_pod.sh`     | Add a pod (netns + veth) and register it |
            | `scripts/del_pod.sh`     | Remove a pod and clean up map entries |
            | `scripts/add_remote_route.sh` | Add a cross-host routing entry |
            | `scripts/teardown_host.sh`    | Detach XDP and clean up all state |

            ## Supported Platforms

            | OS | Architecture |
            |----|--------------|
            | Ubuntu 22.04 | x86\_64 |
            | Ubuntu 24.04 | x86\_64 |
            | Ubuntu 22.04 | arm64   |
            | Ubuntu 24.04 | arm64   |

            ## Quick Start

            ```bash
            tar xzf xdp-ipip-overlay-*.tar.gz
            cd xdp-ipip-overlay-*/
            # Initialize XDP on the host (attach to eth0 + pod veths)
            sudo bash scripts/setup_host.sh <host_ip> <eth_iface>
            # Add a pod
            sudo bash scripts/add_pod.sh pod1 10.244.1.10
            # Verify cross-host connectivity
            sudo ip netns exec ns_pod1 ping 10.244.2.10
            ```
          files: dist/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

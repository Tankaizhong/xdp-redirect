name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # 1. Build on every supported platform
  # ────────────────────────────────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.os }} · ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            runner: ubuntu-22.04
            arch: x86_64
            extra_packages: libc6-dev-i386
          - os: ubuntu-24.04
            runner: ubuntu-24.04
            arch: x86_64
            extra_packages: libc6-dev-i386
          - os: ubuntu-22.04
            runner: ubuntu-22.04-arm
            arch: arm64
            extra_packages: ""
          - os: ubuntu-24.04
            runner: ubuntu-24.04-arm
            arch: arm64
            extra_packages: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang llvm \
            libelf-dev libpcap-dev libbpf-dev \
            build-essential \
            linux-headers-$(uname -r) \
            ${{ matrix.extra_packages }}

      - name: Build
        run: make

      # ── Package: BPF object is arch-independent, user binary is per-arch ──
      - name: Package artifacts
        run: |
          TAG=${GITHUB_REF_NAME}
          OS=$(echo "${{ matrix.os }}" | tr '.' '-')   # ubuntu-22-04
          ARCH=${{ matrix.arch }}
          DIST="xdp-redirect-${TAG}-${OS}-${ARCH}"

          mkdir -p "$DIST"
          cp xdp_prog_kern.o "$DIST/"
          cp xdp_prog_user   "$DIST/"
          cp setup_netns.sh  "$DIST/"
          cp README.md       "$DIST/"

          tar czf "${DIST}.tar.gz" "$DIST"
          echo "DIST_FILE=${DIST}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: "*.tar.gz"

  # ────────────────────────────────────────────────────────────────────────
  # 2. Collect all tarballs and create GitHub Release
  # ────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: release-*
          merge-multiple: true

      - name: List collected artifacts
        run: ls -lh dist/

      - name: Extract changelog entry for this tag
        id: changelog
        run: |
          TAG=${GITHUB_REF_NAME}
          # If you maintain a CHANGELOG.md, extract the section for $TAG here.
          # Fallback: use the annotated tag message.
          MSG=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || echo "Release $TAG")
          # GitHub multiline output
          {
            echo 'notes<<EOF'
            echo "$MSG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ${{ steps.changelog.outputs.notes }}

            ## Artifacts

            | File | Description |
            |------|-------------|
            | `xdp_prog_kern.o` | BPF bytecode (architecture-independent) |
            | `xdp_prog_user`   | User-space configuration tool (per-arch) |
            | `setup_netns.sh`  | One-shot setup script |

            ## Supported Platforms

            | OS | Architecture |
            |----|--------------|
            | Ubuntu 22.04 | x86\_64 |
            | Ubuntu 24.04 | x86\_64 |
            | Ubuntu 22.04 | arm64   |
            | Ubuntu 24.04 | arm64   |

            ## Quick Start

            ```bash
            tar xzf xdp-redirect-*.tar.gz
            cd xdp-redirect-*/
            sudo bash setup_netns.sh
            sudo ip netns exec ns1 ping 10.0.1.2
            ```
          files: dist/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
